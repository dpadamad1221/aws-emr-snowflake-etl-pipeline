name: Python CI

on:
  push:
    branches: [ main, feature/emr-snowflake-etl ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate Python syntax
        run: |
          python -m py_compile src/*.py
